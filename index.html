<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Toyota Eligibility - 3 Result Level</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box}
body{margin:0;background:#f5f5f5;font-family:Arial,sans-serif;color:#1d1d1f}
.hero{background:linear-gradient(135deg,#d71920,#8d1115);color:white;text-align:center;padding:28px 18px 58px}
.hero h1{margin:0;font-size:23px;line-height:1.25}
.hero p{margin:8px 0 0;font-size:14px;opacity:.9}
.app{max-width:720px;margin:-38px auto 0;padding:0 14px 80px}
.panel{background:white;border-radius:20px;padding:18px;box-shadow:0 10px 28px rgba(0,0,0,.08)}
label{display:block;margin-top:13px;font-size:12px;font-weight:800;color:#666;letter-spacing:1.5px;text-transform:uppercase}
input{width:100%;margin-top:8px;padding:15px;font-size:22px;font-weight:800;border:1px solid #ddd;border-radius:14px;background:white;color:#222}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
.tenureBtn{border:1px solid #ddd;background:white;border-radius:13px;padding:13px 8px;text-align:center;font-weight:800;color:#555;cursor:pointer}
.tenureBtn.active{border:2px solid #d71920;color:#d71920;background:#fff7f7}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.grid2 input{font-size:16px;font-weight:700;padding:13px}
.methodBox{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.methodBox input{display:none}
.methodBox label{margin:0;padding:13px 10px;border-radius:13px;border:1px solid #ddd;background:#fff;text-align:center;font-size:14px;color:#555;letter-spacing:0;text-transform:none;cursor:pointer}
.methodBox input:checked+label{background:#d71920;color:white;border-color:#d71920}
.hint{margin-top:12px;text-align:center;color:#777;font-size:12px;line-height:1.45}
.summary{max-width:720px;margin:16px auto 10px;padding:0 14px;color:#666;font-size:14px}
.cards{max-width:720px;margin:0 auto;padding:0 14px 90px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{background:white;border-radius:18px;overflow:hidden;box-shadow:0 8px 22px rgba(0,0,0,.06);border:2px solid transparent;cursor:pointer;min-height:206px}
.card.pass{border-color:#20a44b}.card.try{border-color:#f59e0b}.card.fail{opacity:.55;filter:grayscale(.35)}
.carArt{height:110px;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;color:rgba(0,0,0,.18);letter-spacing:1px;background-size:contain;background-repeat:no-repeat;background-position:center;background-color:#fff}
.carArt.hasImage span{display:none}
.modalArt{background-size:contain;background-repeat:no-repeat;background-position:center;background-color:#fff}
.modalArt.hasImage{color:transparent}
.vios{background:#f0c0bc}.yaris{background:#bfd5ee}.cross{background:#c9dfca}.hilux{background:#d9d1c3}.suv{background:#d7c4e8}.premium{background:#dfc5b7}.van{background:#c8d9dc}.ev{background:#c9d8f1}
.cardBody{padding:13px}.modelName{font-size:17px;font-weight:900;letter-spacing:.5px;margin-bottom:6px}
.priceRange{color:#666;font-size:12px;margin-bottom:10px}.badge{display:inline-block;padding:7px 10px;border-radius:999px;font-size:12px;font-weight:900}
.badge.pass{background:#e8f7ed;color:#15803d}.badge.try{background:#fff7e6;color:#9a5b00}.badge.fail{background:#fdeaea;color:#b42318}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.48);display:none;align-items:flex-end;z-index:99}.modal.show{display:flex}
.sheet{width:100%;max-width:720px;margin:0 auto;max-height:88vh;overflow:auto;background:white;border-radius:24px 24px 0 0;padding:0 18px 22px}
.close{position:sticky;top:10px;margin-left:auto;width:44px;height:44px;border-radius:999px;border:0;background:rgba(0,0,0,.08);font-size:24px;display:block;z-index:2}
.modalArt{height:150px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:900;color:rgba(0,0,0,.18);letter-spacing:1px;margin-top:-20px}
.modalTitle{font-size:27px;font-weight:900;margin:18px 0 4px}.modalSub{color:#666;margin-bottom:14px;font-size:14px}
.quickStats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:14px 0 18px}
.stat{background:#fafafa;border-radius:15px;padding:12px 8px;text-align:center}.stat strong{display:block;color:#d71920;font-size:17px;margin-bottom:4px}.stat span{color:#666;font-size:11px;line-height:1.25}
table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;color:#666;font-size:11px;letter-spacing:1px;padding:10px 4px;border-bottom:2px solid #eee}
td{padding:13px 4px;border-bottom:1px solid #eee;vertical-align:top;font-weight:700}td.monthly{color:#d71920;font-weight:900;white-space:nowrap}
.dot{width:14px;height:14px;border-radius:50%;display:inline-block}.dot.pass{background:#20a44b}.dot.try{background:#f59e0b}.dot.fail{background:#ccc}
.wa{position:fixed;left:14px;right:14px;bottom:14px;max-width:692px;margin:auto;display:block;background:#20c45a;color:white;padding:15px;text-align:center;border-radius:15px;font-weight:900;text-decoration:none;z-index:50;box-shadow:0 10px 24px rgba(0,0,0,.18)}
.tiny{font-size:11px;color:#777;line-height:1.4;margin-top:12px;text-align:center}
@media(max-width:430px){.cards{gap:10px}.cardBody{padding:12px}.modelName{font-size:16px}.priceRange{font-size:12px}.carArt{height:100px;font-size:28px}.stat strong{font-size:15px}table{font-size:12px}}
</style>
</head>
<body>
<div class="hero"><h1>🚗 Toyota Eligibility</h1><p>Masukkan gaji, pilih tahun, semak model yang sesuai</p></div>

<div class="app"><div class="panel">
<label>Gaji Bersih Anda</label><input id="salary" type="number" value="3000" inputmode="decimal">

<div class="grid3">
<div class="tenureBtn" data-tenure="5">5 Tahun</div>
<div class="tenureBtn active" data-tenure="7">7 Tahun</div>
<div class="tenureBtn" data-tenure="9">9 Tahun</div>
</div>

<div class="methodBox">
<input type="radio" id="methodFlat" name="method" value="flat" checked><label for="methodFlat">Flat Rate</label>
<input type="radio" id="methodEir" name="method" value="eir"><label for="methodEir">EIR</label>
</div>

<div class="grid2">
<div><label>Deposit RM</label><input id="depositAmount" type="number" value="9000" inputmode="decimal"></div>
<div><label id="rateLabel">Flat Rate %</label><input id="rate" type="number" value="2.30" step="0.01" inputmode="decimal"></div>
</div>

<div class="hint" id="hint">Result: LULUS kalau bawah 30%, BOLEH TRY kalau 30%-50%, GAGAL kalau atas 50% daripada gaji bersih.</div>
</div></div>

<div class="summary" id="summary"></div>
<div class="cards" id="cards"></div>

<div class="modal" id="modal"><div class="sheet">
<button class="close" id="closeBtn">×</button>
<div class="modalArt" id="modalArt"></div>
<div class="modalTitle" id="modalTitle"></div>
<div class="modalSub" id="modalSub"></div>

<div class="quickStats">
<div class="stat"><strong id="startDeposit">RM0</strong><span>Deposit</span></div>
<div class="stat"><strong id="startMonthly">RM0</strong><span>Monthly</span></div>
<div class="stat"><strong id="modalStatus">-</strong><span>Result</span></div>
</div>

<table>
<thead><tr><th>SPEC</th><th>DEPOSIT</th><th>MONTHLY</th><th>RESULT</th></tr></thead>
<tbody id="variantRows"></tbody>
</table>

<div class="tiny" id="modalTiny"></div>
</div></div>

<a class="wa" id="waBtn" href="#" target="_blank">💬 Tanya Sales Advisor</a>

<script>
const salesPhone="60173939788";
const LULUS_LIMIT=30;
const TRY_LIMIT=50;

const models=[
{model:"Yaris",tag:"Hatchback",art:"YARIS",color:"yaris",image:"images/yaris.jpg",image:"images/yaris.jpg",variants:[["1.5E",88000],["1.5G",91600]]},
{model:"Yaris Cross",tag:"Compact SUV",art:"CROSS",color:"cross",image:"images/yaris-cross.jpg",image:"images/yaris-cross.jpg",variants:[["1.5S",99900],["1.5 HEV",109900]]},
{model:"Vios",tag:"Sedan",art:"VIOS",color:"vios",image:"images/vios.jpg",image:"images/vios.jpg",variants:[["1.5E",90600],["1.5G",96600],["1.5 HEV",103900],["1.5 GRS HEV",109900]]},
{model:"Veloz",tag:"7-Seater",art:"VELOZ",color:"suv",image:"images/veloz.jpg",image:"images/veloz.jpg",variants:[["1.5",95000]]},
{model:"Corolla Cross",tag:"SUV",art:"CROSS",color:"cross",image:"images/corolla-cross.jpg",image:"images/corolla-cross.jpg",variants:[["1.8V",133800],["1.8 HEV",140800],["1.8 GRS HEV",148800]]},
{model:"Corolla",tag:"Sedan",art:"ALTIS",color:"vios",image:"images/corolla.jpg",image:"images/corolla.jpg",variants:[["1.8G",144800],["1.8GRS",149800]]},
{model:"Hilux",tag:"Pickup",art:"HILUX",color:"hilux",image:"images/hilux.jpg",image:"images/hilux.jpg",variants:[["2.4 S/C MT",104880],["2.4E MT",117880],["2.4E AT",119880],["2.4V AT",149580],["2.8 Rogue",163000],["2.8 GRS",173280],["BEV 144kW",226300]]},
{model:"Innova Zenix",tag:"MPV",art:"ZENIX",color:"suv",image:"images/innova-zenix.jpg",image:"images/innova-zenix.jpg",variants:[["2.0V",165000],["2.0 HEV",202000]]},
{model:"Fortuner",tag:"SUV",art:"FORT",color:"suv",image:"images/fortuner.jpg",image:"images/fortuner.jpg",variants:[["2.4D AT",195800],["2.8D VRZ",241800],["2.7P SRZ",202880]]},
{model:"Camry",tag:"Premium Sedan",art:"CAMRY",color:"premium",image:"images/camry.jpg",image:"images/camry.jpg",variants:[["2.5V",221800],["2.5 HEV",248800]]},
{model:"Harrier",tag:"Premium SUV",art:"HARRIER",color:"premium",image:"images/harrier.jpg",image:"images/harrier.jpg",variants:[["2.5 HEV",289000]]},
{model:"Hiace",tag:"Commercial Van",art:"HIACE",color:"van",image:"images/hiace.jpg",image:"images/hiace.jpg",variants:[["Window 2.8 AT",172000],["Panel 3.0 MT",127800]]},
{model:"Vellfire",tag:"Luxury MPV",art:"VELL",color:"premium",image:"images/vellfire.jpg",image:"images/vellfire.jpg",variants:[["2.5",448000],["2.5 HEV",549900]]},
{model:"Alphard",tag:"Luxury MPV",art:"ALPH",color:"premium",image:"images/alphard.jpg",image:"images/alphard.jpg",variants:[["2.4 Turbo EL",548000]]},
{model:"EV",tag:"Electric",art:"BEV",color:"ev",image:"images/ev.jpg",image:"images/ev.jpg",variants:[["Urban Cruiser BEV",198000],["bZ4X BEV",220000]]}
].map(m=>({...m,variants:m.variants.map(v=>({spec:v[0],price:v[1]}))}));

const els={salary:document.getElementById("salary"),depositAmount:document.getElementById("depositAmount"),rate:document.getElementById("rate"),rateLabel:document.getElementById("rateLabel"),methodFlat:document.getElementById("methodFlat"),methodEir:document.getElementById("methodEir"),cards:document.getElementById("cards"),summary:document.getElementById("summary"),modal:document.getElementById("modal"),closeBtn:document.getElementById("closeBtn"),modalArt:document.getElementById("modalArt"),modalTitle:document.getElementById("modalTitle"),modalSub:document.getElementById("modalSub"),startDeposit:document.getElementById("startDeposit"),startMonthly:document.getElementById("startMonthly"),modalStatus:document.getElementById("modalStatus"),variantRows:document.getElementById("variantRows"),modalTiny:document.getElementById("modalTiny"),waBtn:document.getElementById("waBtn"),hint:document.getElementById("hint")};

let selectedTenure=7,lastResults=[];
function rm(v,c=false){return"RM"+Number(v).toLocaleString("en-MY",{minimumFractionDigits:c?2:0,maximumFractionDigits:c?2:0})}
function num(el){const v=Number(el.value);return isNaN(v)?0:v}
function getMethod(){return document.querySelector('input[name="method"]:checked').value}
function methodName(){return getMethod()==="eir"?"EIR":"Flat Rate"}
function monthlyFlat(loan,rate,years){const months=years*12;if(loan<=0||months<=0)return 0;const interest=loan*(rate/100)*years;return(loan+interest)/months}
function monthlyEir(loan,rate,years){const months=years*12,r=(rate/100)/12;if(loan<=0||months<=0)return 0;if(r<=0)return loan/months;return loan*r/(1-Math.pow(1+r,-months))}
function monthlyCalc(loan,rate,years){return getMethod()==="eir"?monthlyEir(loan,rate,years):monthlyFlat(loan,rate,years)}
function updateMethodUI(){if(getMethod()==="eir"){els.rateLabel.textContent="EIR %";els.hint.textContent="EIR mode: LULUS ≤30%, BOLEH TRY 30%-50%, GAGAL >50% daripada gaji bersih.";if(num(els.rate)<3)els.rate.value="4.40"}else{els.rateLabel.textContent="Flat Rate %";els.hint.textContent="Flat mode: LULUS ≤30%, BOLEH TRY 30%-50%, GAGAL >50% daripada gaji bersih.";if(num(els.rate)>3.5)els.rate.value="2.30"}}
function calcVariant(v){const salary=num(els.salary),lulusLimit=salary*(LULUS_LIMIT/100),tryLimit=salary*(TRY_LIMIT/100),deposit=Math.max(num(els.depositAmount),0),rate=num(els.rate);const actualDeposit=Math.min(deposit,v.price),loan=Math.max(v.price-actualDeposit,0),monthly=monthlyCalc(loan,rate,selectedTenure);let result="fail";if(salary>0&&monthly<=lulusLimit)result="pass";else if(salary>0&&monthly<=tryLimit)result="try";return{...v,deposit:actualDeposit,loan,monthly,result,pass:result==="pass",try:result==="try"}}
function priceRange(vars){const p=vars.map(v=>v.price);return `${rm(Math.min(...p))} - ${rm(Math.max(...p))}`}
function render(){updateMethodUI();const computed=models.map(model=>{const variants=model.variants.map(calcVariant),passCount=variants.filter(v=>v.result==="pass").length,tryCount=variants.filter(v=>v.result==="try").length;let modelResult="fail";if(passCount>0)modelResult="pass";else if(tryCount>0)modelResult="try";return{...model,variants,passCount,tryCount,modelResult}});lastResults=computed;const totalPass=computed.filter(m=>m.modelResult==="pass").length,totalTry=computed.filter(m=>m.modelResult==="try").length,totalFail=computed.filter(m=>m.modelResult==="fail").length;els.summary.textContent=`${totalPass} LULUS · ${totalTry} BOLEH TRY · ${totalFail} GAGAL`;els.cards.innerHTML=computed.map((m,i)=>{const cls=m.modelResult;let badgeText="❌ GAGAL";if(cls==="pass")badgeText=`✅ LULUS ${m.passCount}/${m.variants.length} spec`;if(cls==="try")badgeText=`⚠️ BOLEH TRY ${m.tryCount}/${m.variants.length} spec`;return`<div class="card ${cls}" onclick="openModel(${i})">`<div class="carArt ${m.color}${m.image?" hasImage":""}" style="${m.image?`background-image:url(\'${m.image}\')`:""}"><span>${m.art}</span></div>`<div class="cardBody"><div class="modelName">${m.model}</div><div class="priceRange">${priceRange(m.variants)}</div><span class="badge ${cls}">${badgeText}</span></div></div>`}).join("");const msg=`Saya nak semak Toyota eligibility.%0AGaji: ${rm(num(els.salary))}%0ATahun: ${selectedTenure}%0ADeposit: ${rm(num(els.depositAmount))}%0A${methodName()}: ${num(els.rate)}%25%0A${totalPass} lulus, ${totalTry} boleh try.`;els.waBtn.href=`https://wa.me/${salesPhone}?text=${msg}`}
function openModel(i){const m=lastResults[i],cheapest=[...m.variants].sort((a,b)=>a.price-b.price)[0],firstPass=m.variants.find(v=>v.result==="pass"),firstTry=m.variants.find(v=>v.result==="try"),display=firstPass||firstTry||cheapest;els.modalArt.className=`modalArt ${m.color}${m.image?" hasImage":""}`;
if(m.image){els.modalArt.style.backgroundImage=`url('${m.image}')`;els.modalArt.textContent="";}else{els.modalArt.style.backgroundImage="";els.modalArt.textContent=m.art;}els.modalTitle.textContent=`Toyota ${m.model}`;els.modalSub.textContent=`${m.tag} · ${selectedTenure} Tahun · ${methodName()} ${num(els.rate).toFixed(2)}%`;els.startDeposit.textContent=rm(display.deposit);els.startMonthly.textContent=rm(display.monthly,true);els.modalStatus.textContent=m.modelResult==="pass"?"✅ LULUS":m.modelResult==="try"?"⚠️ TRY":"❌ GAGAL";els.variantRows.innerHTML=m.variants.map(v=>{const label=v.result==="pass"?"✅":v.result==="try"?"⚠️":"❌";return`<tr><td>${v.spec}</td><td>${rm(v.deposit)}</td><td class="monthly">${rm(v.monthly,true)}/bln</td><td><span class="dot ${v.result}"></span> ${label}</td></tr>`}).join("");els.modalTiny.textContent=`LULUS ≤30% gaji · BOLEH TRY 30%-50% gaji · Deposit ${rm(num(els.depositAmount))} · ${methodName()} ${num(els.rate).toFixed(2)}% · ${selectedTenure} tahun. Anggaran sahaja, subject to bank approval.`;els.modal.classList.add("show")}
function closeModal(){els.modal.classList.remove("show")}
document.querySelectorAll(".tenureBtn").forEach(btn=>btn.addEventListener("click",()=>{document.querySelectorAll(".tenureBtn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");selectedTenure=Number(btn.dataset.tenure);render()}));
[els.salary,els.depositAmount,els.rate,els.methodFlat,els.methodEir].forEach(el=>{el.addEventListener("input",render);el.addEventListener("change",render)});
els.closeBtn.addEventListener("click",closeModal);els.modal.addEventListener("click",e=>{if(e.target===els.modal)closeModal()});window.openModel=openModel;render();
</script>
</body>
</html>
